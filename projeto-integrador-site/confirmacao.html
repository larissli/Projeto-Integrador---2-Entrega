<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Confirmação de agendamento de consulta na Elo Sênior.">
    <title>Agendamento Confirmado - Elo Sênior</title>

    <link rel="icon" href="img/icon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <a href="#conteudo-principal" class="skip-link">Pular para a confirmação</a>

    <div class="barra-acessibilidade" role="region" aria-label="Ferramentas de acessibilidade">
        <div class="container-acessibilidade">
            <span class="texto-acessibilidade">Tamanho do texto:</span>
            <button id="btn-diminuir" class="btn-acessibilidade" aria-label="Diminuir tamanho da fonte">A-</button>
            <button id="btn-aumentar" class="btn-acessibilidade" aria-label="Aumentar tamanho da fonte">A+</button>
        </div>
    </div>

    <header class="cabecalho">
        <div class="container">
            <div class="logo-container centralizado">
                <a href="index.html" title="Voltar para o início">
                    <img src="img/logo.png" alt="Logotipo Elo Sênior" class="img-logo">
                </a>
                <h1 class="nome-logo">Elo <span class="destaque">Sênior</span></h1>
            </div>
        </div>
    </header>

    <main id="conteudo-principal">
        <section class="secao-branca secao-confirmacao">
            <div class="container">
                <i class="fas fa-check-circle icone-confirmacao" aria-hidden="true"></i>
                <h2>Agendamento realizado</h2>
                <p class="texto-destaque-confirmacao">
                    Obrigado. Recebemos seu pedido com sucesso.<br>
                    Em instantes, nossa equipe entrará em contato pelo <strong>WhatsApp</strong> para confirmar o horário exato.
                </p>

                <div class="grupo-acoes-confirmacao">
                    <a href="index.html" class="botao-grande">VOLTAR PARA O INÍCIO</a>
                    <a href="loja.html" class="botao-pequeno botao-secundario">CONHECER A LOJA</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <div class="container">
            <p>&copy; 2026 Elo Sênior.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
